name: Higher-Ed Intel Twice Weekly

on:
  schedule:
    - cron: "47 18 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil

      - name: Generate briefing
        run: |
          python higher-ed-intel/generator/generate_weekly_brief.py

      - name: Commit updated briefing files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add higher-ed-intel/data
          git commit -m "Auto update higher-ed briefing" || echo "No changes"
          git push

           - name: Deploy to Hostinger (attempt 1)
        id: ftp_deploy_1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: higher-ed-intel/
          server-dir: higher-ed-intel/

      - name: Deploy to Hostinger (retry if first attempt fails)
        if: failure() && steps.ftp_deploy_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: higher-ed-intel/
          server-dir: higher-ed-intel/
