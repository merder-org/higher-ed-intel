name: Higher-Ed Intel Twice Weekly

on:
  schedule:
    - cron: "47 18 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil

      - name: Generate briefing
        run: |
          python higher-ed-intel/generator/generate_weekly_brief.py

      - name: Commit updated briefing files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add higher-ed-intel/data
          git commit -m "Auto update higher-ed briefing" || echo "No changes"
          git push

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to Hostinger with lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          set ftp:passive-mode true;
          set net:max-retries 5;
          set net:reconnect-interval-base 5;
          set net:timeout 20;
          open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
          mirror -R --delete --verbose higher-ed-intel/ higher-ed-intel/;
          bye
          "
